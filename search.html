<!DOCTYPE html>
<html>
<head>
    <title>Book Ticket - TravelEase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">TravelEase</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
    </nav>
</header>

<section class="page-section">
    <div class="glass-card">
        <h2>Search & Book Tickets</h2>
        <p>Plan your journey with ease</p>

        <form action="BookingServlet" method="post">
            <input type="text" name="source" placeholder="From" required>
            <input type="text" name="destination" placeholder="To" required>
            <input type="date" name="travelDate" required>

            <select name="travelType" required>
                <option value="">Select Travel Type</option>
                <option value="Train">Train</option>
                <option value="Bus">Bus</option>
            </select>

            <button type="submit">Search</button>
        </form>
    </div>
</section>

</body>
</html>
